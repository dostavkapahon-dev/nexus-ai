services:
  - type: web
    name: nexus-ai
    runtime: python
    rootDir: backend
    # Фронт уже собран и закоммичен (frontend/dist) — npm не нужен.
    # Сборка только Python: лёгкая и не падает.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: HIGGSFIELD_API_KEY
        sync: false
      - key: HEYGEN_API_KEY
        sync: false
